<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALKA | Luxury Beauty Experience</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600&family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Montserrat:wght@100;300&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --soft-pink: #fdf2f2;
            --deep-rose: #d6a4a4;
            --gold: #c5a059;
            --text: #4a3737;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--soft-pink);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- כפתור יוקרתי --- */
        .btn-luxury {
            display: inline-block;
            padding: 18px 45px;
            background: transparent;
            border: 1px solid var(--deep-rose);
            color: var(--text);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
            margin-top: 20px;
            cursor: pointer;
        }

        .btn-luxury:hover {
            color: var(--white);
            background-color: var(--deep-rose);
            box-shadow: 0 10px 30px rgba(214, 164, 164, 0.4);
            transform: translateY(-3px);
        }

        /* --- Header --- */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo { width: 180px; margin-bottom: 20px; animation: fadeIn 2s; }

        .hero-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            font-weight: 300;
            letter-spacing: 5px;
        }

        /* --- Gallery Section --- */
        section { padding: 80px 10%; text-align: center; }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        /* --- Modal (מסך הגלריה המלא) --- */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            overflow-y: auto;
            padding: 50px 20px;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            max-width: 900px;
            margin: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
            align-items: center;
        }

        .modal-content img {
            width: 100%; /* גודל מקורי בתוך הקונטיינר */
            height: auto;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            animation: slideUp 0.8s ease;
        }

        .close-modal {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 40px;
            cursor: pointer;
            color: var(--text);
            z-index: 1100;
            font-weight: 100;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Footer --- */
        footer {
            background: var(--white);
            padding: 100px 20px;
            text-align: center;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #25d366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 900;
        }

    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="logo">
        <h1 class="hero-title">MALKA</h1>
        <p>טבעי • פשוט • שלמות</p>
    </header>

    <section data-aos="fade-up">
        <h2 class="section-title">העבודות שלי</h2>
        <p>דיוק, אומנות ותוצאות שמדברות בעד עצמן</p>
        <button class="btn-luxury" onclick="openGallery('workGallery')">לצפייה בעבודות שלי</button>
    </section>

    <section data-aos="fade-up">
        <h2 class="section-title">פרגונים וחוות דעת</h2>
        <p>מה שהלקוחות שלי מספרות</p>
        <button class="btn-luxury" onclick="openGallery('feedbackGallery')">לצפייה בחוות הדעת</button>
    </section>

    <section data-aos="fade-up">
        <h2 class="section-title">הקולקציה שלנו</h2>
        <p>מוצרי טיפוח ותכשיטי עבודת יד</p>
        <button class="btn-luxury" onclick="openGallery('itemGallery')">לצפייה במוצרים</button>
    </section>

    <div id="workGallery" class="modal">
        <span class="close-modal" onclick="closeGallery('workGallery')">&times;</span>
        <div class="modal-content" id="workContent"></div>
    </div>

    <div id="feedbackGallery" class="modal">
        <span class="close-modal" onclick="closeGallery('feedbackGallery')">&times;</span>
        <div class="modal-content" id="feedbackContent"></div>
    </div>

    <div id="itemGallery" class="modal">
        <span class="close-modal" onclick="closeGallery('itemGallery')">&times;</span>
        <div class="modal-content" id="itemContent"></div>
    </div>

    <footer>
        <h2 class="section-title">מוכנה לשינוי?</h2>
        <a href="https://wa.me/972548033717" class="btn-luxury" style="background: var(--text); color: white;">קבעי תור עכשיו</a>
        <p style="margin-top: 30px;">054-803-3717</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });

        // פונקציה למילוי הגלריות בתוך המודאל
        function fillModal(containerId, prefix, count, isFeedback = false) {
            const container = document.getElementById(containerId);
            for (let i = 1; i <= count; i++) {
                const img = document.createElement('img');
                // אם זה חוות דעת, הקובץ הוא רק מספר.jpg
                const src = isFeedback ? `${i}.jpg` : `${prefix}${i}.jpg`;
                img.src = src;
                img.alt = `Photo ${i}`;
                // תמונה חלופית אם הקובץ חסר
                img.onerror = function() { this.style.display = 'none'; };
                container.appendChild(img);
            }
        }

        // אתחול התוכן מראש
        fillModal('workContent', 'image', 18);
        fillModal('feedbackContent', '', 23, true);
        fillModal('itemContent', 'item', 4);

        function openGallery(id) {
            document.getElementById(id).style.display = "block";
            document.body.style.overflow = "hidden"; // ביטול גלילה ברקע
        }

        function closeGallery(id) {
            document.getElementById(id).style.display = "none";
            document.body.style.overflow = "auto"; // החזרת גלילה
        }

        // סגירה בלחיצה מחוץ לתמונה
        window.onclick = function(event) {
            if (event.target.className === 'modal') {
                event.target.style.display = "none";
                document.body.style.overflow = "auto";
            }
        }
    </script>
</body>
</html>
