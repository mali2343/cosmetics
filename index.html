<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALKA BOUTIQUE | Luxury Aesthetics</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&family=Heebo:wght@900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --cream: #fffaf9;
            --luxury-pink: #f8e1e1;
            --deep-rose: #e5b3b3;
            --gold-gradient: linear-gradient(135deg, #c5a059 0%, #f1e0b5 50%, #c5a059 100%);
            --text-dark: #2d2424;
            --gold-text: #b18d4b;
            --shadow: 0 15px 35px rgba(214, 164, 164, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Assistant', sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Layout Structures --- */
        section { padding: 80px 20px; max-width: 1200px; margin: 0 auto; }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo {
            width: 150px;
            border-radius: 50%;
            border: 4px solid #f1e0b5;
            margin-bottom: 20px;
        }

        .hero-title {
            font-family: 'Heebo', sans-serif;
            font-size: clamp(3rem, 10vw, 6rem);
            background: linear-gradient(to bottom, #3a2d2d, #b18d4b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .treatment-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: 0.5s;
        }

        .treatment-card i { font-size: 2.5rem; margin-bottom: 20px; color: var(--gold-text); }

        .btn-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .luxury-button {
            padding: 15px 40px;
            background: var(--gold-gradient);
            border-radius: 50px;
            border: none;
            color: white;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        /* --- THE GALLERY FIX --- */
        .gallery-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .overlay-active { display: flex !important; }

        .slider-viewport {
            width: 90%;
            max-width: 500px; /* מתאים למובייל ולסרטונים אנכיים */
            height: 80vh;
            position: relative;
        }

        .main-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            height: 100%;
            scrollbar-width: none;
        }

        .main-slider::-webkit-scrollbar { display: none; }

        .slider-item {
            min-width: 100%;
            height: 100%;
            scroll-snap-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slider-item img, .slider-item video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .close-gallery {
            position: absolute;
            top: 20px; right: 20px;
            font-size: 35px;
            cursor: pointer;
            z-index: 3100;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 3050;
        }
        .next { left: -20px; }
        .prev { right: -20px; }

        /* Footer */
        .contact-card {
            background: white;
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .whatsapp-link {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: #25d366;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <section class="hero">
        <img src="logo.png" alt="Logo" class="logo" data-aos="zoom-in">
        <h1 class="hero-title" data-aos="fade-up">מלכה • בוטיק</h1>
        <p style="letter-spacing: 3px; font-weight: 800; color: var(--gold-text);">PURE BEAUTY RITUALS</p>
    </section>

    <section id="services">
        <h2 style="text-align:center; font-size: 3rem; font-family: 'Heebo';">תפריט הטיפולים</h2>
        <div class="grid-layout">
            <div class="treatment-card" data-aos="fade-up">
                <i class="fa-solid fa-eye"></i>
                <h3>הרמת ריסים</h3>
                <p>הדגשת הריסים הטבעיים למראה פתוח וזוהר ללא צורך במסקרה.</p>
            </div>
            <div class="treatment-card" data-aos="fade-up" data-aos-delay="100">
                <i class="fa-solid fa-feather"></i>
                <h3>עיצוב גבות</h3>
                <p>אדריכלות גבות בהתאמה אישית למבנה הפנים שלך.</p>
            </div>
            <div class="treatment-card" data-aos="fade-up" data-aos-delay="200">
                <i class="fa-solid fa-sparkles"></i>
                <h3>שעוות בוטיק</h3>
                <p>הסרת שיער עדינה ומקצועית לתוצאות חלקות ונעימות.</p>
            </div>
        </div>

        <div class="btn-container">
            <button class="luxury-button" onclick="toggleGallery('work-gallery')">עבודות שלי</button>
            <button class="luxury-button" onclick="toggleGallery('feedback-gallery')">חוות דעת</button>
        </div>
    </section>

    <div id="work-gallery" class="gallery-overlay">
        <span class="close-gallery" onclick="toggleGallery('work-gallery')">&times;</span>
        <div class="slider-viewport">
            <div class="nav-arrow next" onclick="scrollSlider('work-slider', 1)"><i class="fas fa-chevron-left"></i></div>
            <div class="nav-arrow prev" onclick="scrollSlider('work-slider', -1)"><i class="fas fa-chevron-right"></i></div>
            
            <div class="main-slider" id="work-slider">
                <div class="slider-item">
                    <video controls playsinline><source src="video1.mp4" type="video/mp4"></video>
                </div>
                <div class="slider-item">
                    <video controls playsinline><source src="video2.mp4" type="video/mp4"></video>
                </div>
            </div>
        </div>
    </div>

    <div id="feedback-gallery" class="gallery-overlay">
        <span class="close-gallery" onclick="toggleGallery('feedback-gallery')">&times;</span>
        <div class="slider-viewport">
            <div class="nav-arrow next" onclick="scrollSlider('feedback-slider', 1)"><i class="fas fa-chevron-left"></i></div>
            <div class="nav-arrow prev" onclick="scrollSlider('feedback-slider', -1)"><i class="fas fa-chevron-right"></i></div>
            <div class="main-slider" id="feedback-slider"></div>
        </div>
    </div>

    <section>
        <div class="contact-card" data-aos="zoom-in">
            <h2>בואי נתאם יופי</h2>
            <p>054-803-3717</p>
            <a href="https://wa.me/972548033717" class="whatsapp-link">שלחי לי הודעה</a>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        function createGalleryItems(containerId, count) {
            const slider = document.getElementById(containerId);
            if(!slider) return;
            for (let i = 1; i <= count; i++) {
                const item = document.createElement('div');
                item.className = 'slider-item';
                const img = document.createElement('img');
                img.src = containerId.includes('work') ? `image${i}.jpg` : `${i}.jpg`;
                img.onerror = () => item.style.display = 'none';
                item.appendChild(img);
                slider.appendChild(item);
            }
        }

        createGalleryItems('work-slider', 18);
        createGalleryItems('feedback-slider', 23);

        function toggleGallery(id) {
            const el = document.getElementById(id);
            el.classList.toggle('overlay-active');
            document.body.style.overflow = el.classList.contains('overlay-active') ? 'hidden' : 'auto';
        }

        function scrollSlider(id, dir) {
            const s = document.getElementById(id);
            s.scrollBy({ left: dir * s.clientWidth * -1, behavior: 'smooth' });
        }
    </script>
</body>
</html>
